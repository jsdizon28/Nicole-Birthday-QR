<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday My Love!</title>

</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        font-family: 'Arial', sans-serif;
        overflow-x: hidden;
        background: linear-gradient(-45deg, #ff5f6d, #ffc371, #47caff, #ff7bff);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
        0% {
            background-position: 0% 50%;
        }

        50% {
            background-position: 100% 50%;
        }

        100% {
            background-position: 0% 50%;
        }
    }

    h1 {
        font-size: 3em;
        text-align: center;
        color: #fff;
        font-weight: bold;
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        margin: 40px 0 20px 0;
    }

    p {
        font-size: 1.5em;
        color: #fff;
        text-align: center;
        font-weight: bold;
        margin-bottom: 40px;
    }

    /* Gallery grid */
    .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        width: 95%;
        max-width: 1200px;
        margin-bottom: 60px;
        perspective: 1000px;
        /* needed for 3D flip */
    }

    /* Flip card container */
    .flip-card {
        width: 100%;
        aspect-ratio: 1/1;
        perspective: 1000px;
        cursor: pointer;
    }

    .flip-card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.8s;
        transform-style: preserve-3d;
    }

    .flip-card.flipped .flip-card-inner {
        transform: rotateY(180deg);
    }

    .flip-card-front,
    .flip-card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 15px;
        backface-visibility: hidden;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        color: #fff;
        font-size: 1.5em;
        font-weight: bold;
        text-align: center;
        padding: 10px;
    }

    .flip-card-front img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .flip-card-back {
        background: rgba(0, 0, 0, 0.8);
        transform: rotateY(180deg);
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        width: 100%;
        height: 100%;
        z-index: 9999;
    }

    @media (max-width: 900px) {
        .gallery {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 600px) {
        h1 {
            font-size: 2em;
        }

        p {
            font-size: 1.2em;
        }

        .gallery {
            grid-template-columns: 1fr;
        }
    }
</style>

<body>

    <h1>🎉 Happy Birthday My Love! 🎉</h1>
    <p>Wishing you the best and a day full of love and joy!</p>

    <!-- 6-image Gallery with Flip Cards -->
    <div class="gallery">
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="./img/img1.jpg">
                </div>
                <div class="flip-card-back">Love you forever 💖</div>
            </div>
        </div>
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="./img/img2.jpg">
                </div>
                <div class="flip-card-back">You are my sunshine ☀️</div>
            </div>
        </div>
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="./img/img3.jpg">
                </div>
                <div class="flip-card-back">Forever together ❤️</div>
            </div>
        </div>
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="./img/img4.jpg">
                </div>
                <div class="flip-card-back">Your so Gorgeous 😍</div>
            </div>
        </div>
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="./img/img5.jpg">
                </div>
                <div class="flip-card-back">You make me smile 😍</div>
            </div>
        </div>
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="./img/img6.jpg">
                </div>
                <div class="flip-card-back">Forever my love 💕</div>
            </div>
        </div>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <audio id="birthday-music" autoplay loop>
        <source src="./music/hbd.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        // Flip card click event
        const flipCards = document.querySelectorAll('.flip-card');
        flipCards.forEach(card => {
            card.addEventListener('click', () => {
                card.classList.toggle('flipped');
            });
        });

        // Fade-in gallery images front side
        const galleryImages = document.querySelectorAll('.flip-card-front img');
        galleryImages.forEach((img, index) => {
            setTimeout(() => img.style.opacity = 1, 500 + index * 300);
        });

        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class HeartParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 15 + 10;
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                this.speed = Math.random() * 2 + 1;
                this.angle = Math.random() * Math.PI * 2;
                this.spin = Math.random() * 0.05 - 0.025;
            }
            drawHeart(x, y, size) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(this.angle);
                ctx.beginPath();
                ctx.moveTo(0, -size / 2);
                ctx.bezierCurveTo(size / 2, -size / 2, size / 2, size / 2, 0, size / 2);
                ctx.bezierCurveTo(-size / 2, size / 2, -size / 2, -size / 2, 0, -size / 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.y += this.speed; this.angle += this.spin; this.x += Math.sin(this.angle) * 2;
                if (this.y > canvas.height + 20) { this.y = -20; this.x = Math.random() * canvas.width; }
            }
            draw() { this.drawHeart(this.x, this.y, this.size); }
        }

        class ConfettiParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.radius = Math.random() * 6 + 4;
                this.color = `hsl(${Math.random() * 360},100%,50%)`;
                this.speed = Math.random() * 3 + 2;
                this.angle = Math.random() * Math.PI * 2;
                this.spin = Math.random() * 0.1 - 0.05;
            }
            update() {
                this.y += this.speed; this.angle += this.spin; this.x += Math.sin(this.angle) * 2;
                if (this.y > canvas.height) { this.y = -10; this.x = Math.random() * canvas.width; }
            }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); }
        }

        function startParticles() {
            particles = [];
            for (let i = 0; i < 80; i++) particles.push(new HeartParticle());
            for (let i = 0; i < 150; i++) particles.push(new ConfettiParticle());
            animateParticles();
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('load', () => { startParticles(); });
    </script>

</body>

</html>
